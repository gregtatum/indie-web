services:
  floppydisk:
    # Use the latest published Docker image.
    image: tatumcreative/floppydisk.link:latest
    # The name of the running container.
    container_name: floppydisk
    # Automatically restart the container unless it is explicitly stopped.
    restart: unless-stopped
    ports:
      # This is the port of the server. You can adjust the number on the
      # right if you need it to use another port.
      - "6543:6543"
    volumes:
      # Choose what folder you want to serve.
      - ./mount:/app/mount

  # To serve a second folder (e.g. a music library) add another service.
  # Each mount point requires its own server instance on a different port.
  # In the app, add it as a separate "Music Storage" server pointing to
  # http://your-host:6544
  #
  # floppydisk-music:
  #   image: tatumcreative/floppydisk.link:latest
  #   container_name: floppydisk-music
  #   restart: unless-stopped
  #   ports:
  #     - "6544:6543"
  #   volumes:
  #     - /path/to/your/music:/app/mount
