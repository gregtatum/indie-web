version: '3'

tasks:
  build-chordpo-lang:
    desc: Build ChordPro grammar artifacts
    cmds:
      - node src/frontend/logic/chordpo-lang/build.js

  # Keep this in sync with `npm run build` which is invoked for the netlify build.
  build:
    desc: |
      Build the project for distribution. The site must be specified.
      SITE=floppydisk task build
      SITE=browserchords task build
    cmds:
      - |
        eval "$(node src/shared/scripts/select-site.mjs)"
        rm -rf dist
        NODE_ENV=production SITE="$SITE" webpack
        SITE="$SITE" node src/shared/scripts/build-docs.mjs

  build-docs:
    desc: |
      Build static docs into dist/docs. The site must be specified.
      SITE=floppydisk task build-docs
      SITE=browserchords task build-docs
    cmds:
      - |
        eval "$(node src/shared/scripts/select-site.mjs)"
        SITE="$SITE" node src/shared/scripts/build-docs.mjs

  check-updates:
    desc: Check for package updates
    cmds:
      - npx npm-check-updates

  start:
    desc: Start one of the Indie Web projects.
    cmds:
      - |
        eval "$(node src/shared/scripts/select-site.mjs)"
        SITE="$SITE" task --parallel start-webpack start-docs-watch

  start-webpack:
    desc: Start Webpack server for the selected site
    cmds:
      - NODE_ENV=development SITE=$SITE ./webpack.server.js

  start-docs-watch:
    desc: Watch docs and rebuild static output on changes
    cmds:
      - |
        SITE="$SITE" nodemon \
          --watch docs \
          --watch data/common/shared.css \
          --ext md,html,css \
          --exec "node src/shared/scripts/build-docs.mjs"

  start-server:
    desc: Start the server in development mode
    dir: src/server
    cmds:
      - '[ -d "node_modules" ] || npm install'
      - npm run start-dev

  lint-js:
    desc: Lint the JavaScript files.
    cmds:
      - eslint "*.{js,mjs}" 'src'

  lint-css:
    desc: Run stylelint CSS linter (no var() fallback values allowed)
    cmds:
      - stylelint 'src/**/*.css' 'data/**/*.css' 'docs/**/*.css'

  lint-fix:
    desc: Automatically fix linting errors for all linters.
    cmds:
      - eslint "*.{js,mjs}" 'src' --fix
      - stylelint 'src/**/*.css' 'data/**/*.css' 'docs/**/*.css' --fix

  bundle-size:
    desc: Calculate the bundle size
    cmds:
      - echo "Bundling webpack"
      - NODE_ENV=production webpack --json > stats.json
      - ./node_modules/.bin/webpack-bundle-analyzer stats.json

  ts:
    desc: TypeScript compilation check
    cmds:
      - task --parallel ts-frontend ts-server ts-shared

  ts-frontend:
    desc: TypeScript compilation check for src/frontend
    cmds:
      - tsc --noEmit --project src/frontend/tsconfig.json

  ts-server:
    desc: TypeScript compilation check for src/server
    cmds:
      - tsc --noEmit --project src/server/tsconfig.json

  ts-shared:
    desc: TypeScript compilation check for src/shared
    cmds:
      - tsc --noEmit --project src/shared/tsconfig.json

  test-frontend:
    desc: Run the front-end tests
    cmds:
      - env NODE_ENV=test jest

  test-frontend-coverage:
    desc: Run tests with coverage report
    cmds:
      - "env NODE_ENV=test jest --coverage"
      - "echo 'View coverage report at: ./coverage/lcov-report/'"

  test-server:
    desc: Run server integration tests (requires Node 22+)
    cmds:
      - node --disable-warning=ExperimentalWarning --test src/server/test/*.test.ts src/server/docker/*.test.mjs

  check:
    desc: Run all checks in a blazing fast configuration with only failures reported.
    silent: true
    cmds:
      - node src/shared/scripts/check.mjs

  docker-server:
    desc: Run the server from docker.
    dir: src/server/docker
    cmds:
      # Add --progress=plain to debug the build.
      - docker compose build
      - docker compose up

  docker-publish:
    desc: "Publish the server Docker image. See src/server/README.md or run: `task docker-publish -- --help`"
    cmds:
      - ./src/server/docker/publish.sh {{.CLI_ARGS}}
